        <main class="content-wrapper">
            <h2 class="page-title">Programming Language</h2>
            <!-- Tech-Stack content -->
            
        <style>
            .zoom-trigger { display: none; }

            .cprog-img {
                transition: transform 0.3s ease;
                cursor: zoom-in;
                border-radius: 4px;
                display: block;
            }

            .zoom-trigger:checked + label .cert-img {
                transform: scale(1.3); 
                position: relative;
                z-index: 100;
                cursor: zoom-out;
            }

            .techstack-list {
                display: flex; 
                flex-direction: row;
                flex-wrap: nowrap;
                list-style: none; 
                padding: 40px 0;
                gap: 30px; 
                justify-content: center;
                overflow-x: visible;
            }

            .java-item {
                display: flex; 
                flex-direction: column; 
                align-items: center;
                flex-shrink: 0;
            }

            @media (max-width: 768px) {
                .techstack-list {
                    flex-direction: column;
                    align-items: center;
                    gap: 50px; 
                }
                
                .zoom-trigger:checked + label .cert-img {
                    transform: scale(1.1);
                }
            }

            .sql-item {
                margin-top: 10px;
                text-decoration: none;
                color: #000000;
                font-family: sans-serif;
            }
        </style>

        <ul class="techstack-list">
            <li class="cprog-item">
                <input type="checkbox" id="zoom-word" class="zoom-trigger">
                <label for="zoom-word">
                    <img src="https://raw.githubusercontent.com/clrssprds/portfolio/b018a14ccd238bf701f75bf28bed7896d90f614a/logos/c-icon.svg" width="150" height="150" class="cprog-img">
                </label>

            </li>

            <li class="java-item">
                <input type="checkbox" id="zoom-pp" class="zoom-trigger">

                    <img src="https://raw.githubusercontent.com/clrssprds/portfolio/b018a14ccd238bf701f75bf28bed7896d90f614a/logos/java-icon.svg" width="150" height="150" class="java-img">
                </label>
                <p>Java</p>
            </li>

            <li class="mysql-item">
                <input type="checkbox" id="zoom-db" class="zoom-trigger">
                <label for="zoom-db">
                    <img src="https://github.com/clrssprds/portfolio/blob/master/logos/sql-icon.png?raw=true" width="150" height="150" class="mysql-img">
                </label>
                <p>MySQL</p>
            </li>

            <li class="html-item">
                <input type="checkbox" id="zoom-db" class="zoom-trigger">

            <li class="css-item">

            <li class="javascript-item">

                <label for="zoom-db">
                    <img src="" width="150" height="150" class="javascript-img">
                </label>
                <p>Javascript</p>
            </li>






        </ul>
